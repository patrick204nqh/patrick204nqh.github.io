<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none">
  <!-- Galleon (no sun) — squared-rigged age-of-exploration ship -->
  <!-- Hull -->
  <path d="M20 140 C20 142 35 162 48 165 L152 165 C165 162 180 142 180 140 Z" fill="#7ab7ef" opacity="0.9"/>
  <!-- Main mast -->
  <rect x="96" y="15" width="6" height="128" rx="2" fill="#7ab7ef" opacity="0.9"/>
  <!-- Fore mast -->
  <rect x="66" y="40" width="4" height="103" rx="1.5" fill="#7ab7ef" opacity="0.55"/>
  <!-- Mizzen mast -->
  <rect x="130" y="45" width="4" height="95" rx="1.5" fill="#7ab7ef" opacity="0.55"/>
  <!-- Main square sails (3 tiers) -->
  <rect x="78" y="22" width="42" height="24" rx="3" fill="#7ab7ef" opacity="0.4"/>
  <rect x="75" y="50" width="48" height="28" rx="3" fill="#7ab7ef" opacity="0.35"/>
  <rect x="72" y="82" width="54" height="30" rx="3" fill="#7ab7ef" opacity="0.3"/>
  <!-- Fore square sails -->
  <rect x="52" y="45" width="32" height="20" rx="2" fill="#7ab7ef" opacity="0.2"/>
  <rect x="50" y="70" width="36" height="24" rx="2" fill="#7ab7ef" opacity="0.15"/>
  <!-- Mizzen sails -->
  <rect x="116" y="50" width="32" height="20" rx="2" fill="#7ab7ef" opacity="0.2"/>
  <rect x="114" y="75" width="36" height="22" rx="2" fill="#7ab7ef" opacity="0.15"/>
  <!-- Bowsprit -->
  <line x1="55" y1="125" x2="12" y2="100" stroke="#7ab7ef" stroke-width="2.5" stroke-linecap="round" opacity="0.5"/>
  <!-- Jib -->
  <path d="M68 48 L62 80 L14 102 Z" fill="#7ab7ef" opacity="0.12"/>
  <!-- Flag -->
  <path d="M99 15 L99 6 L138 11 Z" fill="#7ab7ef" opacity="0.65"/>
</svg>
