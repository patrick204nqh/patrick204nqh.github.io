<script>
(function () {
  /* ---- Timezone colors (fixed +07) ---- */
  var palettes = [
    { name: 'night',     h: [5,7],   skyT: '#0c0f25', skyB: '#161b33', sea: '#020414', sun: 'transparent', sunCls: false },
    { name: 'dawn',      h: [7,9],   skyT: '#1a1a3e', skyB: '#d4735e', sea: '#0c2340', sun: '#fbbf24',     sunCls: true  },
    { name: 'morning',   h: [9,12],  skyT: '#1a3055', skyB: '#5ba3e6', sea: '#0a7ab5', sun: '#fde047',     sunCls: true  },
    { name: 'midday',    h: [12,15], skyT: '#0270b0', skyB: '#7dc4fc', sea: '#025a8a', sun: '#fef08a',     sunCls: true  },
    { name: 'afternoon', h: [15,18], skyT: '#0a4068', skyB: '#d4850a', sea: '#0c2a4a', sun: '#fbbf24',     sunCls: true  },
    { name: 'sunset',    h: [18,20], skyT: '#1a1535', skyB: '#cc3333', sea: '#0a0f2a', sun: '#f97316',     sunCls: true  }
  ];

  function getPalette() {
    var h = new Date().toLocaleString('en', { hour: 'numeric', hour12: false, timeZone: 'Asia/Ho_Chi_Minh' });
    var hour = parseInt(h, 10);
    for (var i = 0; i < palettes.length; i++) {
      var p = palettes[i];
      if (hour >= p.h[0] && hour < p.h[1]) return p;
    }
    return palettes[0];
  }

  function applyPalette(p) {
    var root = document.documentElement;
    root.style.setProperty('--sky-top', p.skyT);
    root.style.setProperty('--sky-bottom', p.skyB);
    root.style.setProperty('--sea-color', p.sea);
    root.style.setProperty('--sun-color', p.sun);
    root.style.setProperty('--cache-sea', p.sea);
    var sun = document.getElementById('hero-sun');
    if (sun) {
      if (p.sunCls) sun.classList.add('visible');
      else sun.classList.remove('visible');
    }
  }

  applyPalette(getPalette());
  setInterval(function () { applyPalette(getPalette()); }, 60000);

  /* ---- Light / Dark toggle ---- */
  var theme = sessionStorage.getItem('pt-theme');
  if (theme) document.documentElement.setAttribute('data-theme', theme);

  window.toggleTheme = function () {
    var root = document.documentElement;
    var current = root.getAttribute('data-theme');
    var next = current === 'light' ? null : 'light';
    if (next) root.setAttribute('data-theme', 'light');
    else root.removeAttribute('data-theme');
    sessionStorage.setItem('pt-theme', next || '');
  };

  /* ---- Liquid glass nav ---- */
  var nav = document.querySelector('.site-nav');
  var ticking = false;
  function updateNav() {
    var scrollY = window.scrollY || window.pageYOffset;
    var hero = document.getElementById('hero');
    var heroBottom = hero ? hero.offsetHeight : window.innerHeight;
    var progress = Math.min(scrollY / (heroBottom * 0.4), 1);
    var blurVal = 8 + progress * 16;
    var opacityVal = 0.15 + progress * 0.55;
    var borderAlpha = progress * 0.12;
    nav.style.setProperty('--nav-blur', blurVal + 'px');
    nav.style.setProperty('--nav-bg-alpha', opacityVal);
    nav.style.setProperty('--nav-border-alpha', borderAlpha);
    if (progress > 0.05) nav.classList.add('nav-scrolled');
    else nav.classList.remove('nav-scrolled');
    ticking = false;
  }
  window.addEventListener('scroll', function () {
    if (!ticking) { window.requestAnimationFrame(updateNav); ticking = true; }
  }, { passive: true });
  updateNav();

  /* ---- Ocean canvas animation ---- */
  (function () {
    var canvas = document.getElementById('ocean-canvas');
    if (!canvas) return;
    var ctx = canvas.getContext('2d');
    var W, H, seaLevel;
    var seaColor = getComputedStyle(document.documentElement).getPropertyValue('--sea-color').trim() || '#020414';
    var animId;

    function resize() {
      var rect = canvas.parentElement.getBoundingClientRect();
      W = canvas.width = rect.width;
      H = canvas.height = rect.height;
      seaLevel = H * 0.58;
    }
    resize();
    window.addEventListener('resize', resize);

    var waves = [
      { amp: 28, freq: 0.006, speed: 0.012, phase: 0 },
      { amp: 18, freq: 0.01,  speed: 0.018, phase: 2.1 },
      { amp: 12, freq: 0.018, speed: 0.025, phase: 4.3 }
    ];

    var particles = [];
    for (var i = 0; i < 40; i++) {
      particles.push({
        x: Math.random() * W, y: Math.random(),
        size: Math.random() * 2.5 + 0.8, speed: Math.random() * 0.4 + 0.15,
        drift: Math.random() * 3 - 1.5, opacity: Math.random() * 0.4 + 0.1
      });
    }

    var time = 0;

    function waveY(x, t) {
      var y = 0;
      for (var w = 0; w < waves.length; w++) {
        y += Math.sin(x * waves[w].freq + t * waves[w].speed + waves[w].phase) * waves[w].amp;
      }
      return seaLevel + y;
    }

    function hexToRgb(hex) {
      var r = parseInt(hex.slice(1,3), 16);
      var g = parseInt(hex.slice(3,5), 16);
      var b = parseInt(hex.slice(5,7), 16);
      return {r: r, g: g, b: b};
    }

    function drawOcean() {
      seaColor = getComputedStyle(document.documentElement).getPropertyValue('--sea-color').trim() || '#020414';
      var c = hexToRgb(seaColor);
      var t = time * 0.016;

      ctx.clearRect(0, 0, W, H);

      var grad = ctx.createLinearGradient(0, seaLevel - 10, 0, H);
      grad.addColorStop(0, 'rgba(' + c.r + ',' + c.g + ',' + c.b + ',0.7)');
      grad.addColorStop(1, 'rgba(' + Math.max(c.r-15,0) + ',' + Math.max(c.g-15,0) + ',' + Math.max(c.b-15,0) + ',0.95)');
      ctx.fillStyle = grad;
      ctx.fillRect(0, seaLevel - 10, W, H - seaLevel + 10);

      for (var w = 0; w < waves.length; w++) {
        var alpha = 0.5 - w * 0.12;
        ctx.beginPath();
        ctx.moveTo(0, H);
        for (var x = 0; x <= W; x += 3) {
          ctx.lineTo(x, waveY(x, t));
        }
        ctx.lineTo(W, H);
        ctx.closePath();
        ctx.fillStyle = 'rgba(' + Math.min(c.r+40,255) + ',' + Math.min(c.g+50,255) + ',' + Math.min(c.b+60,255) + ',' + alpha + ')';
        ctx.fill();
      }

      for (var i = 0; i < particles.length; i++) {
        var p = particles[i];
        p.x += p.speed + p.drift * 0.01;
        if (p.x > W + 20) p.x = -20;
        var surfaceY = waveY(p.x, t);
        var shimmer = Math.sin(time * 0.04 + p.x * 0.008 + p.y * 10) * 0.4 + 0.6;
        var sparkle = Math.sin(time * 0.07 + p.x * 0.02 + p.y * 20) > 0.85 ? 1 : 0;
        ctx.beginPath();
        ctx.arc(p.x, surfaceY - p.size * 1.5, p.size * (sparkle ? 2 : 1), 0, Math.PI * 2);
        ctx.fillStyle = 'rgba(255,255,255,' + (p.opacity * shimmer + sparkle * 0.3) + ')';
        ctx.fill();
      }

      ctx.beginPath();
      ctx.moveTo(0, waveY(0, t));
      for (var x = 0; x <= W; x += 4) {
        ctx.lineTo(x, waveY(x, t));
      }
      ctx.strokeStyle = 'rgba(255,255,255,0.06)';
      ctx.lineWidth = 2;
      ctx.stroke();

      time++;
      animId = requestAnimationFrame(drawOcean);
    }

    drawOcean();

    window.addEventListener('resize', function() {
      resize();
      if (animId) cancelAnimationFrame(animId);
      drawOcean();
    });
  })();

  /* ---- Video audio (audio toggle button + scroll fade) ---- */
  (function() {
    var video = document.querySelector('.hero-video');
    var toggle = document.getElementById('audio-toggle');
    if (!video || !toggle) return;
    var isPlaying = false;
    var fadeTimer;

    function setVolume(v) {
      video.volume = Math.max(0, Math.min(v, 0.3));
    }

    function startAudio() {
      if (isPlaying) return;
      isPlaying = true;
      video.muted = false;
      setVolume(0);
      toggle.classList.remove('muted');
      var vol = 0;
      var fadeIn = function() {
        vol = Math.min(vol + 0.015, 0.3);
        setVolume(vol);
        if (vol < 0.3) requestAnimationFrame(fadeIn);
      };
      fadeIn();
    }

    function stopAudio() {
      if (!isPlaying) return;
      isPlaying = false;
      toggle.classList.add('muted');
      var vol = video.volume;
      var fadeOut = function() {
        vol = Math.max(vol - 0.02, 0);
        setVolume(vol);
        if (vol > 0) requestAnimationFrame(fadeOut);
        else video.muted = true;
      };
      fadeOut();
    }

    toggle.addEventListener('click', function(e) {
      e.stopPropagation();
      if (isPlaying) stopAudio();
      else startAudio();
    });

    /* Auto-start audio on first user interaction with the page */
    var autoStarted = false;
    function autoStartAudio() {
      if (autoStarted) return;
      autoStarted = true;
      if (!isPlaying) startAudio();
      document.removeEventListener('click', autoStartAudio);
      document.removeEventListener('touchstart', autoStartAudio);
    }
    document.addEventListener('click', autoStartAudio, { once: true });
    document.addEventListener('touchstart', autoStartAudio, { once: true });

    /* Fade audio out on scroll past hero */
    window.addEventListener('scroll', function () {
      if (!isPlaying) return;
      clearTimeout(fadeTimer);
      fadeTimer = setTimeout(function () {
        var hero = document.getElementById('hero');
        if (!hero) return;
        var heroBottom = hero.offsetHeight;
        var scrollY = window.scrollY || window.pageYOffset;
        var fadeProgress = Math.min(scrollY / (heroBottom * 0.5), 1);
        setVolume(0.3 * (1 - fadeProgress));
      }, 30);
    }, { passive: true });
  })();

  /* ---- GitHub data for homepage ---- */
  (function() {
    var repoCountEl = document.getElementById('gh-repo-count');
    var starCountEl = document.getElementById('gh-star-count');
    var reposEl = document.getElementById('gh-repos');
    if (!reposEl) return;

    function renderRepo(repo) {
      var card = document.createElement('a');
      card.className = 'gh-repo-card';
      card.href = repo.html_url;
      card.target = '_blank';
      card.rel = 'noopener noreferrer';
      card.innerHTML =
        '<span class="gh-repo-name">' + repo.name + '</span>' +
        '<span class="gh-repo-desc">' + (repo.description || '') + '</span>' +
        '<span class="gh-repo-meta">' +
          (repo.language ? '<span class="gh-repo-lang">' + repo.language + '</span>' : '') +
          (repo.stargazers_count > 0 ? '<span class="gh-repo-stars">&#9733; ' + repo.stargazers_count + '</span>' : '') +
        '</span>';
      return card;
    }

    fetch('https://api.github.com/users/patrick204nqh/repos?per_page=100&type=public&sort=updated')
      .then(function(r) { return r.json(); })
      .then(function(repos) {
        if (!Array.isArray(repos)) throw new Error('Invalid response');
        var filtered = repos.filter(function(r) { return !r.fork && !r.archived; });
        var totalStars = filtered.reduce(function(sum, r) { return sum + r.stargazers_count; }, 0);

        if (repoCountEl) repoCountEl.textContent = filtered.length;
        if (starCountEl) starCountEl.textContent = totalStars;

        var sorted = filtered.sort(function(a, b) { return b.stargazers_count - a.stargazers_count; });
        var top = sorted.slice(0, 4);

        reposEl.innerHTML = '';
        if (top.length === 0) {
          reposEl.innerHTML = '<p class="section-body" style="color:var(--text-muted);grid-column:1/-1">No public repositories yet.</p>';
        } else {
          top.forEach(function(r) { reposEl.appendChild(renderRepo(r)); });
        }
      })
      .catch(function() {
        if (repoCountEl) repoCountEl.textContent = '\u2014';
        if (starCountEl) starCountEl.textContent = '\u2014';
        reposEl.innerHTML = '<p class="section-body" style="color:var(--text-muted);grid-column:1/-1">Could not load GitHub data.</p>';
      });
  })();

  /* ---- Scroll reveal (IntersectionObserver, no scroll-listener) ---- */
  (function() {
    if (!window.IntersectionObserver) return;
    var items = document.querySelectorAll('.reveal');
    var observer = new IntersectionObserver(function(entries) {
      entries.forEach(function(entry) {
        if (entry.isIntersecting) {
          entry.target.classList.add('visible');
          observer.unobserve(entry.target);
        }
      });
    }, { rootMargin: '0px 0px -80px 0px', threshold: 0.1 });
    items.forEach(function(el) { observer.observe(el); });
  })();
})();
</script>
