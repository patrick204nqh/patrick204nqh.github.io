---
layout: default
---
<article class="post" style="padding: 6rem 1.5rem 3rem; max-width: 42rem; margin: 0 auto;">
  <header class="post-header">
    <h1>{{ page.title }}</h1>
    <time datetime="{{ page.date | date_to_xmlschema }}">{{ page.date | date: "%B %d, %Y" }}</time>
  </header>
  <div class="post-content">
    {{ content }}
  </div>
</article>
