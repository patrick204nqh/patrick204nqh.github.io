# ponytail: stripped from 350 lines → 24. Removed: skin, analytics providers, comments, pagination,
# search, social sharing, breadcrumbs, category/tag archives, sass, html compression.
# jekyll-github-metadata fetches live repo data at build time. Tag a repo with "oss" on GitHub
# and it appears in the OSS section automatically.

title: "PATRICK204NQH"
name: "Huy Nguyen"
description: "Software developer & OSS contributor."
url: "https://patrick204nqh.github.io"
repository: "patrick204nqh/patrick204nqh.github.io"

markdown: kramdown
kramdown:
  input: GFM

permalink: /:year/:title/

plugins:
  - jekyll-github-metadata
  - jekyll-feed
  - jekyll-seo-tag
  - jekyll-sitemap

defaults:
  - scope:
      path: ""
      type: posts
    values:
      layout: post
