# ponytail: stripped from 350 lines → 24. Projects page uses client-side GitHub API
# fetch — no build-time tokens needed. Tag a repo with "oss" on GitHub and it appears
# in the OSS section automatically.

title: "PATRICK204NQH"
name: "Huy Nguyen"
description: "Software developer & OSS contributor."
url: "https://patrick204nqh.com"
repository: "patrick204nqh/patrick204nqh.github.io"

markdown: kramdown
kramdown:
  input: GFM

permalink: /:year/:title/

plugins:
  - jekyll-github-metadata
  - jekyll-feed
  - jekyll-seo-tag
  - jekyll-sitemap

defaults:
  - scope:
      path: ""
      type: posts
    values:
      layout: post
